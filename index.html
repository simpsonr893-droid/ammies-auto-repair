<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.svg" sizes="any" />

    <!-- Primary SEO -->
    <title>[Your Business Name] — [Your City] Collision Repair</title>
    <meta name="description" content="[Your city]'s trusted collision repair experts. From minor dents to major damage, [Your Business Name] restores your vehicle to factory perfection. All insurance accepted. Call (000) 000-0000." />
    <meta name="keywords" content="auto body shop [city], collision repair [city], car body repair [city], paintless dent removal, insurance auto repair [city], [Your Business Name]" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.yourbusiness.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.yourbusiness.com/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="[Your Business Name]" />
    <meta property="og:title" content="[Your Business Name] — [Your City] Collision Repair" />
    <meta property="og:description" content="[Your city]'s trusted collision repair experts. All insurance accepted. Fast turnaround. Call (000) 000-0000." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1619642751034-765dfdf7c58e?auto=format&fit=crop&q=80&w=1200&h=630" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="[Your Business Name] — [Your City] collision repair" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="[Your Business Name] — [Your City] Collision Repair" />
    <meta name="twitter:description" content="[Your city]'s trusted collision repair experts. All insurance accepted. Fast turnaround." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1619642751034-765dfdf7c58e?auto=format&fit=crop&q=80&w=1200&h=630" />

    <!-- Local SEO / Geo -->
    <meta name="geo.region" content="US-[STATE]" />
    <meta name="geo.placename" content="[Your City, State]" />
    <meta name="geo.position" content="[LAT];[LNG]" />
    <meta name="ICBM" content="[LAT], [LNG]" />

    <!-- Fonts (loaded as <link> for earlier discovery vs CSS @import) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />

    <!-- Preload LCP hero image -->
    <link rel="preload" as="image" href="https://images.unsplash.com/photo-1619642751034-765dfdf7c58e?auto=format&fit=crop&q=80&w=1920" />

    <!-- JSON-LD: LocalBusiness + AutoRepair structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": ["AutoRepair", "LocalBusiness"],
      "name": "[Your Business Name]",
      "image": "https://images.unsplash.com/photo-1619642751034-765dfdf7c58e?auto=format&fit=crop&q=80&w=1200",
      "url": "https://www.yourbusiness.com/",
      "telephone": "+10000000000",
      "email": "info@yourbusiness.com",
      "priceRange": "$$",
      "description": "[Your city]'s trusted collision repair experts. From minor dents to major damage, [Your Business Name] restores your vehicle to factory perfection. All insurance accepted.",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "[Your Street Address]",
        "addressLocality": "[Your City]",
        "addressRegion": "[State]",
        "postalCode": "[ZIP]",
        "addressCountry": "US"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 0.0,
        "longitude": 0.0
      },
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
          "opens": "09:00",
          "closes": "17:00"
        }
      ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "5.0",
        "reviewCount": "6",
        "bestRating": "5",
        "worstRating": "1"
      },
      "hasMap": "https://maps.google.com/maps?q=[Your+Address+Here]",
      "areaServed": [
        { "@type": "City", "name": "[City 1]" },
        { "@type": "City", "name": "[City 2]" },
        { "@type": "City", "name": "[City 3]" }
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Auto Body Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Collision Repair" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Auto Painting" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Insurance Claims Assistance" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Paintless Dent Removal" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Free Estimates" } }
        ]
      }
    }
    </script>

    <!-- JSON-LD: FAQ structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What are your business hours?",
          "acceptedAnswer": { "@type": "Answer", "text": "We are open from 9:00 AM to 5:00 PM Monday through Saturday. We are closed on Sundays." }
        },
        {
          "@type": "Question",
          "name": "Do you work with my insurance company?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes! We work with all major insurance providers. Our team handles the claims process from start to finish." }
        },
        {
          "@type": "Question",
          "name": "How long does a typical repair take?",
          "acceptedAnswer": { "@type": "Answer", "text": "Repair times vary depending on the extent of the damage and parts availability. After your initial estimate, we'll give you a projected completion timeline." }
        },
        {
          "@type": "Question",
          "name": "Can I get an estimate online?",
          "acceptedAnswer": { "@type": "Answer", "text": "Absolutely. Use our AI Receptionist (the chat bubble in the corner) to submit your vehicle details and damage description for a preliminary assessment." }
        },
        {
          "@type": "Question",
          "name": "Do you offer a warranty on repairs?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes — all repairs come with our quality guarantee covering workmanship and paint matching." }
        },
        {
          "@type": "Question",
          "name": "Do I need to call ahead or can I just drop in?",
          "acceptedAnswer": { "@type": "Answer", "text": "For estimates, walk-ins are welcome during business hours. For repairs, we recommend scheduling in advance." }
        },
        {
          "@type": "Question",
          "name": "Do you offer rental car assistance?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. We coordinate directly with your insurance company's rental program and work with local rental agencies to get you a loaner." }
        },
        {
          "@type": "Question",
          "name": "Can you repair all makes and models?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes — our certified technicians work on all makes and models, domestic and foreign, including trucks and SUVs." }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
